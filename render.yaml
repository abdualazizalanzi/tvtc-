services:
  - type: web
    name: tvtc-skill-record
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tvtc-db
          property: connectionString
    databases:
      - name: tvtc-db
        databaseName: skillrecord
        user: skillrecord
        generateValue: true

